<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>egg</title>
<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#2b1d14;
  color:#f5f1e8;
}
.header{
  text-align:center;
  padding:10px;
  font-size:18px;
}
.tabs{
  display:flex;
}
.tab{
  flex:1;
  text-align:center;
  padding:8px;
  border-bottom:2px solid #555;
}
.tab.active{
  border-bottom:2px solid #4caf50;
}
.container{
  padding:5px;
}
.card{
  background:#3b2a1f;
  margin:5px 0;
  padding:8px;
  border-left:4px solid transparent;
  display:flex;
  flex-direction:column;
}
.card.cancel{
  border-left:4px solid #4caf50;
}
.card.done{
  opacity:0.4;
}
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.big{
  font-size:20px;
}
.small{
  font-size:14px;
}
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:#2b1d14;
  display:flex;
  padding:5px;
}
input{
  flex:1;
  font-size:18px;
}
button{
  width:80px;
  font-size:16px;
}
</style>
</head>
<body>

<div class="header">孵化地タイマー</div>

<div class="tabs">
  <div class="tab active" id="tabMain">メイン</div>
  <div class="tab" id="tabSub">サブ</div>
</div>

<div class="container" id="container"></div>

<div class="footer">
  <input type="text" id="timeInput" placeholder="HHMM" maxlength="4">
  <button id="startBtn">開始</button>
</div>

<script>
let currentTab = "main";

const timers = Array(8).fill(null).map(()=>({
  end: null,
  total: null,
  selected:false
}));

function format(ms){
  if(ms <= 0) return "00:00";
  let m = Math.floor(ms/60000);
  let h = Math.floor(m/60);
  m = m%60;
  return String(h).padStart(2,'0') + ":" + String(m).padStart(2,'0');
}

function render(){
  const container = document.getElementById("container");
  container.innerHTML = "";

  const startIndex = currentTab === "main" ? 0 : 4;
  let notify = false;

  for(let i=0;i<4;i++){
    const idx = startIndex + i;
    const t = timers[idx];
    const now = Date.now();

    let cancelRemain = 0;
    let endRemain = 0;
    let state = "normal";

    if(t.end){
      const cancelTime = t.end - t.total/2;
      cancelRemain = cancelTime - now;
      endRemain = t.end - now;

      if(now >= t.end){
        state = "done";
      }else if(now >= cancelTime){
        state = "cancel";
      }
    }

    if(state === "cancel" || state === "done"){
      notify = true;
    }

    const card = document.createElement("div");
    card.className = "card";
    if(state==="cancel") card.classList.add("cancel");
    if(state==="done") card.classList.add("done");

    const row1 = document.createElement("div");
    row1.className="row";

    const label = document.createElement("div");
    label.textContent = (idx+1);

    const checkbox = document.createElement("input");
    checkbox.type="checkbox";
    checkbox.checked = t.selected;
    checkbox.onchange = ()=>{
      t.selected = checkbox.checked;
    };

    row1.appendChild(label);
    row1.appendChild(checkbox);

    const big = document.createElement("div");
    big.className="big";
    big.textContent = format(cancelRemain);

    const small = document.createElement("div");
    small.className="small";
    small.textContent = format(endRemain);

    card.appendChild(row1);
    card.appendChild(big);
    card.appendChild(small);

    container.appendChild(card);
  }

  document.getElementById("tabMain").textContent = "メイン" + (currentTab==="sub" && hasNotify(0,4) ? "●":"");
  document.getElementById("tabSub").textContent = "サブ" + (currentTab==="main" && hasNotify(4,8) ? "●":"");
}

function hasNotify(start,end){
  const now = Date.now();
  for(let i=start;i<end;i++){
    const t = timers[i];
    if(!t.end) continue;
    const cancelTime = t.end - t.total/2;
    if(now >= cancelTime) return true;
  }
  return false;
}

document.getElementById("startBtn").onclick = ()=>{
  const val = document.getElementById("timeInput").value;
  if(!/^\d{4}$/.test(val)) return;

  const h = parseInt(val.slice(0,2));
  const m = parseInt(val.slice(2,4));
  if(m>59) return;

  const total = (h*60+m)*60000;
  const now = Date.now();

  const startIndex = currentTab === "main" ? 0 : 4;

  for(let i=0;i<4;i++){
    const idx = startIndex + i;
    if(timers[idx].selected){
      timers[idx].total = total;
      timers[idx].end = now + total;
    }
  }
};

document.getElementById("tabMain").onclick = ()=>{
  currentTab = "main";
  document.getElementById("tabMain").classList.add("active");
  document.getElementById("tabSub").classList.remove("active");
};

document.getElementById("tabSub").onclick = ()=>{
  currentTab = "sub";
  document.getElementById("tabSub").classList.add("active");
  document.getElementById("tabMain").classList.remove("active");
};

setInterval(render,1000);
render();
</script>

</body>
</html>
